<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Scheme Generator</title>

    <!-- Goggle Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Script files -->
    <script type="module" src="./script.js"></script>

    <!-- MY CSS -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <section class="user-choice">
        <form id="color-choice-form">
          <input type="color" name="hexValue" value="#F55A5A" />
          <select name="colorMode">
            <option value="monochrome" selected>Monochrome</option>
            <option value="monochrome-dark">Monochrome-dark</option>
            <option value="monochrome-light">Monochrome-light</option>
            <option value="analogic">Analogic</option>
            <option value="complement">Complement</option>
            <option value="analogic-complement">Analogic-complement</option>
            <option value="triad">Triad</option>
          </select>
          <button type="submit" class="color-btn" id="get-color-btn">
            Get color scheme
          </button>
        </form>
      </section>
      <section id="colors-el">
        <div class="color-container">
          <div class="color" id="colorOne"></div>
          <div class="color" id="colorTwo"></div>
          <div class="color" id="colorThree"></div>
          <div class="color" id="colorFour"></div>
          <div class="color" id="colorFive"></div>
        </div>
        <footer class="hex-footer" id="hex-value">
          <p class="color-hex">#F55A5A</p>
          <p class="color-hex">#2B283A</p>
          <p class="color-hex">#FBF3AB</p>
          <p class="color-hex">#AAD1B6</p>
          <p class="color-hex">#A626D3</p>
        </footer>
      </section>
    </main>
  </body>
</html>
