<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Scheme Generator</title>

    <!-- Script files -->
    <script type="module" src="./script.js"></script>

    <!-- MY CSS -->
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <section class="user-choice">
        <form id="color-choice-form">
          <input type="color" name="hexValue" value="#F55A5A" />
          <select name="colorMode">
            <option value="monochrome" selected>Monochrome</option>
            <option value="monochrome-dark">Monochrome-dark</option>
            <option value="monochrome-light">Monochrome-light</option>
            <option value="analogic">Analogic</option>
            <option value="complement">Complement</option>
            <option value="analogic-complement">Analogic-complement</option>
            <option value="triad">Triad</option>
          </select>
          <button type="submit" id="get-color-btn">Get color scheme</button>
        </form>
      </section>
      <section class="colors">
        <div class="color-container">
          <div class="color" id="color-one"></div>
          <div class="color" id="color-two"></div>
          <div class="color" id="color-three"></div>
          <div class="color" id="color-four"></div>
          <div class="color" id="color-five"></div>
        </div>
        <footer class="hex-footer">
          <p class="color-hex" id="hex-one">#F55A5A</p>
          <p class="color-hex" id="hex-two">#2B283A</p>
          <p class="color-hex" id="hex-three">#FBF3AB</p>
          <p class="color-hex" id="hex-four">#AAD1B6</p>
          <p class="color-hex" id="hex-five">#A626D3</p>
        </footer>
      </section>
    </main>
  </body>
</html>
